# B3 固定话术与关键词库（版本化；修改后重启进程生效）
version: 1
locale: zh-CN

tiers:
  crisis_self:
    markers:
      - 自杀
      - 自殺
      - 结束生命
      - 不想活了
      - kill myself
      - suicide
      - end my life
    reply: |
      我在这里陪你，但你此刻说的内容涉及自我伤害风险，超出了我能安全协助的范围。
      请尽快联系身边可信的人，或拨打当地紧急求助电话 / 心理援助热线；
      如果你正在面临紧迫危险，请立即联系紧急服务。
      我不会提供任何可能加重伤害的具体方法，但我关心你的安全。

  crisis_other:
    markers:
      - 杀人
      - 报复社会
      - 炸弹怎么做
      - how to make a bomb
      - mass shooting
    reply: |
      你描述的内容可能涉及对他人的严重伤害或违法风险；我不能提供相关方法或协助。
      如果你担心现实风险，请联系当地紧急服务或相关机构。
      如果你愿意，我们可以讨论更安全的替代方案或情绪支持（不涉及伤害细节）。
