# 纯逻辑全套验收（无 GGUF / 无 GPU），Windows + Ubuntu 双平台门禁（Sprint 4.5）
name: acceptance_logic

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  full_acceptance_skip_gpu:
    strategy:
      fail-fast: false
      matrix:
        # 固定镜像版本，减少 latest 漂移；与 unit_tests / static_checks 一致
        os: [ubuntu-24.04, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install (dev + cloud stub)
        run: python -m pip install -q -e ".[dev,cloud]"
      - name: Full acceptance (logic only)
        run: python scripts/full_acceptance.py --skip-gpu
        env:
          PYTHONPATH: src
          # Windows runner 默认 cp1252；步骤名含中文时需 UTF-8
          PYTHONIOENCODING: utf-8
