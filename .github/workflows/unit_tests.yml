name: unit_tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -q -e ".[dev]"
      - name: Pytest (quick)
        run: python -m pytest -q
