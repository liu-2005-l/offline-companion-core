name: static_checks

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Legacy companion import scan
        run: python scripts/ci/check_legacy_companion.py
      - name: Architecture import scan
        run: python scripts/ci/check_imports.py
      - name: Ruff
        run: |
          python -m pip install -q ruff
          ruff check src tests scripts
      - name: Upgrade packaging tools
        run: python -m pip install -q --upgrade pip setuptools wheel
      - name: Dependency vulnerability scan
        run: |
          python -m pip install -q pip-audit
          pip-audit
