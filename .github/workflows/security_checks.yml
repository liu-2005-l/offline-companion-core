name: security_checks

on:
  workflow_call:
  workflow_dispatch:

jobs:
  security:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -q -e ".[dev]"
      - name: Legacy companion import scan
        run: python scripts/ci/check_legacy_companion.py
      - name: Architecture import scan
        run: python scripts/ci/check_imports.py
      - name: Ruff
        run: |
          python -m pip install -q ruff
          ruff check src tests scripts
      - name: Dependency vulnerability scan
        run: |
          python -m pip install -q pip-audit
          pip-audit
      - name: Security pytest gate
        run: python -m pytest -q -m security
      - name: Security summary
        run: python scripts/ci/security_summary.py --static-checks --security-pytests --dependency-audit
